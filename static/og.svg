<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" font-family="'Mona Sans','Helvetica Neue',Arial,sans-serif">
	<rect width="1200" height="630" fill="#0f1115" />
	<!-- soft accent glow -->
	<defs>
		<radialGradient id="g" cx="18%" cy="16%" r="55%">
			<stop offset="0%" stop-color="#a2e326" stop-opacity="0.24" />
			<stop offset="100%" stop-color="#a2e326" stop-opacity="0" />
		</radialGradient>
	</defs>
	<rect width="1200" height="630" fill="url(#g)" />
	<!-- dotted grid -->
	<g fill="#ffffff" fill-opacity="0.05">
		<circle cx="0" cy="0" r="0" />
	</g>
	<!-- logo -->
	<g transform="translate(80,90)">
		<!-- the library's own focus ring around the lime key-cap (matches the on-site Logo) -->
		<rect x="-13" y="-13" width="98" height="98" rx="31" fill="none" stroke="#609b00" stroke-width="5" stroke-opacity="0.55" />
		<rect width="72" height="72" rx="16" fill="#a2e326" />
		<g transform="translate(20,20) scale(1.0)">
			<path d="M22 9.2C21.4 6.7 18.9 5.2 15.7 5.2C11.9 5.2 9 7 9 10.1C9 12.7 11.2 14 15.6 14.9C20.4 15.9 23 17.2 23 20.4C23 23.7 19.8 25.6 16 25.6C12.5 25.6 9.9 24.1 9 21.6" fill="none" stroke="#222d11" stroke-width="3.4" stroke-linecap="round" />
		</g>
		<text x="100" y="50" font-size="34" font-weight="300" fill="#e6e8ee">svelte<tspan dx="7" fill="#a2e326" font-weight="800">aria</tspan></text>
	</g>
	<!-- headline -->
	<text x="80" y="300" font-size="76" font-weight="700" fill="#ffffff" letter-spacing="-1.5">Accessible components,</text>
	<text x="80" y="386" font-size="76" font-weight="700" letter-spacing="-1.5" fill="#a2e326">in your own hand.</text>
	<!-- sub -->
	<text x="80" y="466" font-size="32" fill="#a9adbb">Headless-first for Svelte 5. Keyboard, pointer &amp; focus done right.</text>
	<text x="80" y="510" font-size="32" fill="#a9adbb">Copy the source, own every line.</text>
	<!-- footer -->
	<text x="80" y="574" font-size="26" fill="#71768a">WAI-ARIA validated · runes + attachments · MIT</text>
</svg>
